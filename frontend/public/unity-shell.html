<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes" />
    <title>Unity Game Shell</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }
      #unity-container {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        height: 100dvh;
      }
      #unity-canvas {
        width: 100%;
        height: 100%;
        background: #231f20;
        touch-action: none;
      }
      #unity-loading-bar {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: none;
        text-align: center;
      }
      #unity-logo {
        width: 154px;
        height: 130px;
        margin: 0 auto 18px auto;
        /* Set at runtime based on the configured unity-game base URL (query param "base"). */
        background-size: contain;
      }
      #unity-progress-bar-empty {
        width: 280px;
        height: 18px;
        border: 1px solid rgba(255,255,255,.35);
        background: rgba(255,255,255,.08);
        overflow: hidden;
        margin: 0 auto;
      }
      #unity-progress-bar-full {
        width: 0%;
        height: 100%;
        background: #fff;
      }
      #unity-progress-text {
        margin-top: 12px;
        color: #fff;
        font-size: 14px;
      }
      #unity-warning {
        position: absolute;
        left: 50%;
        top: 20px;
        transform: translateX(-50%);
        z-index: 20;
        max-width: min(92vw, 760px);
      }
      #rotate-hint {
        position: absolute;
        inset: 0;
        z-index: 30;
        display: none;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.75);
        color: #fff;
        text-align: center;
        padding: 24px;
      }
      #rotate-hint .card {
        max-width: 420px;
        width: 100%;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(0,0,0,0.55);
        border-radius: 16px;
        padding: 18px 16px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.35);
        backdrop-filter: blur(10px);
      }
      #rotate-hint .title {
        font-weight: 800;
        font-size: 16px;
        margin-bottom: 10px;
      }
      #rotate-hint .desc {
        opacity: 0.85;
        font-size: 13px;
        line-height: 1.5;
      }
      .unity-banner {
        margin-bottom: 8px;
        padding: 12px 14px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, .35);
        white-space: pre-wrap;
        word-break: break-word;
      }
      .unity-banner.error {
        background: #ef4444;
        color: #fff;
      }
      .unity-banner.warning {
        background: #facc15;
        color: #111827;
      }
    </style>
  </head>
  <body>
    <div id="unity-container">
      <canvas id="unity-canvas" tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
        <div id="unity-progress-text">加载中 0%</div>
      </div>
      <div id="unity-warning"></div>
      <div id="rotate-hint">
        <div class="card">
          <div class="title">请旋转手机到横屏</div>
          <div class="desc">iOS 浏览器通常不能强制锁定横屏，全屏体验需要你手动旋转设备。旋转后会自动进入游戏。</div>
        </div>
      </div>
    </div>

    <script>
      const container = document.querySelector("#unity-container");
      const canvas = document.querySelector("#unity-canvas");
      const loadingBar = document.querySelector("#unity-loading-bar");
      const progressBarFull = document.querySelector("#unity-progress-bar-full");
      const progressText = document.querySelector("#unity-progress-text");
      const warningBanner = document.querySelector("#unity-warning");
      const rotateHint = document.querySelector("#rotate-hint");
      const unityLogo = document.querySelector("#unity-logo");
      const searchParams = new URLSearchParams(window.location.search);
      const isMobileShell = searchParams.get("mobile") === "1" ||
        /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

      const unityBaseRaw = searchParams.get("base") || "/unity-game";
      const unityBase = unityBaseRaw.replace(/\/+$/, "");

      if (unityLogo) {
        unityLogo.style.backgroundImage = `url("${unityBase}/TemplateData/unity-logo-dark.png")`;
      }

      // iOS Safari/Chrome can report unstable 100vh due to browser UI bars.
      // Use a CSS variable based on innerHeight for consistent full-screen sizing.
      function syncViewportUnit() {
        const vh = (window.innerHeight || 0) * 0.01;
        if (vh > 0) {
          document.documentElement.style.setProperty("--vh", vh + "px");
        }
      }
      syncViewportUnit();
      window.addEventListener("resize", syncViewportUnit);
      window.addEventListener("orientationchange", syncViewportUnit);

      function syncRotateHint() {
        if (!rotateHint) return;
        if (!isMobileShell) {
          rotateHint.style.display = "none";
          return;
        }
        const isPortrait = window.innerHeight > window.innerWidth;
        // Only prompt on portrait; hide automatically on landscape.
        rotateHint.style.display = isPortrait ? "flex" : "none";
      }
      syncRotateHint();
      window.addEventListener("resize", syncRotateHint);
      window.addEventListener("orientationchange", syncRotateHint);

      function unityShowBanner(msg, type) {
        const div = document.createElement("div");
        div.className = "unity-banner " + (type || "warning");
        div.textContent = msg;
        warningBanner.appendChild(div);
        if (type !== "error") {
          setTimeout(() => {
            if (div.parentNode) div.parentNode.removeChild(div);
          }, 5000);
        }
      }

      window.addEventListener("error", (event) => {
        unityShowBanner("页面错误: " + (event.message || "unknown error"), "error");
        console.error(event.error || event.message);
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason && (event.reason.message || event.reason.toString()) || "unknown promise rejection";
        unityShowBanner("Promise 错误: " + reason, "error");
        console.error(event.reason);
      });

      const buildUrl = unityBase + "/Build";
      // Bump this version after each new Unity WebGL build to invalidate old caches.
      const buildVersion = searchParams.get("v") || "2026-04-18-1";
      const buildVersionStorageKey = "unity-shell-build-version";
      const forceRefresh = searchParams.get("clearCache") === "1";
      const withVersion = (url) => url + "?v=" + encodeURIComponent(buildVersion);
      async function resolveUnityBuildFiles() {
        // Unity may export hashed filenames (when "Name Files As Hashes" is enabled).
        // Parse /unity-game/index.html to find the real Build filenames.
        const indexUrl = withVersion(unityBase + "/index.html");
        const res = await fetch(indexUrl, { credentials: "same-origin" });
        if (!res.ok) {
          throw new Error("Failed to load unity-game index.html: " + res.status);
        }
        const html = await res.text();

        const pick = (re) => {
          const m = html.match(re);
          return m ? m[1] : null;
        };

        // index.html typically contains:
        //   buildUrl + "/<hash>.loader.js"
        //   buildUrl + "/<hash>.data.br"
        // ...so match filenames anywhere (don't rely on escaping mistakes).
        // Support builds with Brotli/Gzip/no-compression:
        //   <hash>.data[.br|.gz]
        //   <hash>.framework.js[.br|.gz]
        //   <hash>.wasm[.br|.gz]
        const loader = pick(/([0-9a-f]+\.loader\.js)/i);
        const data = pick(/([0-9a-f]+\.data(?:\.(?:br|gz))?)/i);
        const framework = pick(/([0-9a-f]+\.framework\.js(?:\.(?:br|gz))?)/i);
        const wasm = pick(/([0-9a-f]+\.wasm(?:\.(?:br|gz))?)/i);

        if (!loader || !data || !framework || !wasm) {
          throw new Error("Failed to parse Unity build filenames from index.html");
        }

        return { loader, data, framework, wasm };
      }

      async function buildUnityConfig() {
        const files = await resolveUnityBuildFiles();
        const loaderUrl = withVersion(buildUrl + "/" + files.loader);
        const config = {
          dataUrl: withVersion(buildUrl + "/" + files.data),
          frameworkUrl: withVersion(buildUrl + "/" + files.framework),
          codeUrl: withVersion(buildUrl + "/" + files.wasm),
        streamingAssetsUrl: unityBase + "/StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Lesson9-" + buildVersion,
        productVersion: buildVersion,
        showBanner: unityShowBanner,
        cacheControl: function (url) {
          if (url.match(/\.(data|bundle|json)(\.br)?$/)) {
            return "must-revalidate";
          }

          if (url.match(/\.(wasm|js)(\.br)?$/)) {
            return "immutable";
          }

          return "must-revalidate";
        },
        };

        if (isMobileShell) {
          config.devicePixelRatio = 1;
        }

        // Ensure the canvas stays pinned to the container size.
        canvas.style.width = "100%";
        canvas.style.height = "100%";
        container.style.height = "calc(var(--vh, 1vh) * 100)";
        document.body.style.height = "calc(var(--vh, 1vh) * 100)";

        return { loaderUrl, config };
      }

      async function clearUnityIndexedDB() {
        if (!("indexedDB" in window)) return;
        try {
          if (indexedDB.databases) {
            const dbs = await indexedDB.databases();
            await Promise.all((dbs || [])
              .filter(db => db && db.name && /(unity|cache|lesson9|defaultcompany)/i.test(db.name))
              .map(db => new Promise((resolve) => {
                const req = indexedDB.deleteDatabase(db.name);
                req.onsuccess = req.onerror = req.onblocked = () => resolve();
              })));
          } else {
            ["UnityCache", "DefaultCompany", "Lesson9"].forEach((name) => {
              try { indexedDB.deleteDatabase(name); } catch (e) {}
            });
          }
        } catch (e) {
          console.warn("Clear IndexedDB failed", e);
        }
      }

      async function syncUnityBuildCache() {
        if (forceRefresh) {
          await clearUnityIndexedDB();
          try {
            localStorage.setItem(buildVersionStorageKey, buildVersion);
          } catch (e) {}
          return;
        }

        try {
          const cachedBuildVersion = localStorage.getItem(buildVersionStorageKey);
          if (cachedBuildVersion === buildVersion) {
            return;
          }
        } catch (e) {}

        await clearUnityIndexedDB();

        try {
          localStorage.setItem(buildVersionStorageKey, buildVersion);
        } catch (e) {}
      }

      async function startUnity() {
        loadingBar.style.display = "block";
        await syncUnityBuildCache();

        let loaderUrl, config;
        try {
          const built = await buildUnityConfig();
          loaderUrl = built.loaderUrl;
          config = built.config;
        } catch (e) {
          unityShowBanner("Unity 配置解析失败：无法从 index.html 解析 Build 文件名（检查 Build 是否为 .br/.gz/无压缩，并确保目录完整）", "error");
          console.error(e);
          return;
        }

        const script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
          createUnityInstance(canvas, config, (progress) => {
            progressBarFull.style.width = (100 * progress) + "%";
            progressText.textContent = "加载中 " + Math.round(progress * 100) + "%";
          }).then((unityInstance) => {
            loadingBar.style.display = "none";
            window.unityInstance = unityInstance;
            if (window.parent) {
              window.parent.postMessage({ type: "unity-ready" }, "*");
            }
          }).catch((message) => {
            unityShowBanner(String(message), "error");
            console.error(message);
          });
        };
        script.onerror = () => {
          unityShowBanner("Unity Loader 加载失败: " + loaderUrl, "error");
        };
        document.body.appendChild(script);
      }

      startUnity();
    </script>
  </body>
</html>
